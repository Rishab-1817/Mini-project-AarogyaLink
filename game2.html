<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthcare Memory Game</title>
<style>
/* --- PROFESSIONAL REDESIGN CSS --- */
body {
    font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* Clean, cool gradient */
    background: linear-gradient(135deg, #e0f2f7, #f7f9fa); 
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 30px 10px;
}

h2 {
    color: #004d99; /* Deep Professional Blue */
    margin-bottom: 25px;
    text-align: center;
    font-weight: 800;
    font-size: 2.5rem;
    letter-spacing: 1px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
}

/* Scoreboard and message container */
#info-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 450px;
    margin-bottom: 20px;
}

#scoreboard {
    background: #ffffff;
    padding: 12px 25px;
    border-radius: 12px;
    /* Soft, professional shadow */
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1); 
    font-weight: 700;
    color: #007bff;
    font-size: 1.1rem;
    margin-bottom: 10px;
    border: 1px solid #cceeff; /* Light border for definition */
}

#message {
    color: #1aa34e; /* Clean success green */
    font-weight: 600;
    font-size: 1.1rem;
    min-height: 25px;
    text-align: center;
}

/* --- Game Grid --- */
#game {
    display: grid;
    /* 4 cards per row desktop */
    grid-template-columns: repeat(4, 1fr); 
    gap: 60px; 
    width: 100%;
    max-width: 700px; /* REDUCED MAX WIDTH (from 800px to 700px) */
    margin: 0 auto;
}

.card {
    position: relative;
    width: 100%;
    padding-top: 100%; 
    perspective: 1000px;
    cursor: pointer;
}

.card-inner {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    transform-style: preserve-3d;
    border-radius: 15px; 
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
}

.card.flip .card-inner {
    transform: rotateY(180deg);
}

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    backface-visibility: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 10px;
}

.card-front {
    background: #007bff; 
    color: white;
    font-size: 2rem;
    font-weight: 700;
    border: 3px solid #0056b3; 
}

.card-back {
    background: #ffffff; 
    transform: rotateY(180deg);
    font-size: 0.9rem;
    color: #333;
    border: 1px solid #ddd;
}

.card-back img {
    max-width: 80%; 
    max-height: 80%;
    filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); 
}

/* --- Adjusted Media Queries for Better Scaling --- */
@media(max-width:768px){
    /* Switch to 3 columns on tablets, smaller max-width */
    #game { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 15px; 
        max-width: 450px; /* Reduced from 500px */
    }
    h2 { font-size: 2rem; }
}

@media(max-width:480px){
    /* Switch to 2 columns on phones, smaller max-width */
    #game { 
        grid-template-columns: repeat(2, 1fr); 
        gap: 10px; 
        max-width: 320px; /* Reduced from 350px */
    }
    h2 { font-size: 1.5rem; }
    .card-front { font-size: 1.5rem; }
}
</style>
</head>
<body>

<h2>🧠 Healthcare Memory Match</h2>
<div id="info-panel">
    <div id="scoreboard">Matches: 0 | Attempts: 0</div>
    <div id="message">Click a card to begin!</div>
</div>
<div id="game"></div>

<script>
// Healthcare card data with real icons
const cardsData = [
  {name:"Bandage", image:"https://cdn-icons-png.flaticon.com/512/2972/2972054.png"},
  {name:"Pill", image:"https://cdn-icons-png.flaticon.com/512/2965/2965567.png"},
  {name:"Syringe", image:"https://cdn-icons-png.flaticon.com/512/2965/2965563.png"},
  {name:"Heart", image:"https://cdn-icons-png.flaticon.com/512/833/833472.png"},
  {name:"Stethoscope", image:"https://cdn-icons-png.flaticon.com/512/2920/2920004.png"},
  {name:"Ambulance", image:"https://cdn-icons-png.flaticon.com/512/2962/2962186.png"},
  {name:"Thermometer", image:"https://cdn-icons-png.flaticon.com/512/2965/2965569.png"},
  {name:"Hospital", image:"https://cdn-icons-png.flaticon.com/512/2965/2965560.png"}
];

// Duplicate & shuffle
let cards = [...cardsData, ...cardsData];
cards = cards.sort(()=>0.5 - Math.random());

let firstCard = null;
let secondCard = null;
let lockBoard = false;
let matches = 0;
let attempts = 0;

const gameContainer = document.getElementById('game');
const message = document.getElementById('message');

// Create card elements
cards.forEach(card=>{
  const cardEl = document.createElement('div');
  cardEl.classList.add('card');
  cardEl.dataset.name = card.name;
  cardEl.innerHTML = `
    <div class="card-inner">
      <div class="card-front">?</div>
      <div class="card-back"><img src="${card.image}" alt="${card.name}" style="width:100%;height:auto;"></div>
    </div>
  `;
  cardEl.addEventListener('click', flipCard);
  gameContainer.appendChild(cardEl);
});

function flipCard(){
  if(lockBoard) return;
  if(this === firstCard) return;
  this.classList.add('flip');

  if(!firstCard){
    firstCard = this;
    return;
  }

  secondCard = this;
  lockBoard = true;
  attempts++;

  checkMatch();
}

function checkMatch(){
  if(firstCard.dataset.name === secondCard.dataset.name){
    matches++;
    message.textContent = "✅ Match Found! Keep going!";
    // Permanently remove event listeners on match
    firstCard.removeEventListener('click', flipCard);
    secondCard.removeEventListener('click', flipCard);
    resetBoard(true);
  } else {
    message.textContent = "❌ No match. Try again!";
    setTimeout(()=>{
      firstCard.classList.remove('flip');
      secondCard.classList.remove('flip');
      resetBoard(false);
    },1000);
  }
  updateScore();
}

function resetBoard(match){
  [firstCard, secondCard] = [null, null];
  lockBoard = false;
}

function updateScore(){
  document.getElementById('scoreboard').textContent = `Matches: ${matches} | Attempts: ${attempts}`;
  if(matches === cardsData.length){
    message.textContent = `🏆 Perfect Game! You completed the match in ${attempts} attempts!`;
    message.style.color = '#004d99';
  } else {
    message.style.color = 'initial'; // Reset color for standard messages
  }
}
</script>

</body>
</html>
