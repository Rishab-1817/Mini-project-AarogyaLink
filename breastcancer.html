<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breast Cancer Quiz - AarogyaLink</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/a2e0c3c6f0.js" crossorigin="anonymous"></script>
  <style>
    body {
    font-family: Arial, sans-serif;
    background: url('pink.png') repeat center center fixed;
    background-size: cover;
    margin: 0;
    padding: 0;
    }

    .quiz-container {
    max-width: 800px;
    margin: 60px auto;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.9); /* semi-transparent white so bg shows */
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    h2 { text-align:center; margin-bottom: 20px; }
    .banner { text-align:center; margin-bottom:20px; }
    .banner img { max-width:120px; }
    .progress-bar { width:100%; background:#e6e6e6; border-radius:8px; overflow:hidden; margin:15px 0 25px; }
    .progress { height:18px; width:0; background:#28a745; text-align:center; color:white; font-size:0.8rem; transition: width 0.4s ease; }
    .question { margin: 20px 0; padding: 15px; background: white; border-radius: 10px; border: 1px solid #ddd; }
    .question h4 { margin-bottom: 10px; }
    .option { display:block; margin: 5px 0; }
    .btn-submit { display:block; margin: 20px auto; padding: 10px 20px; border:none; border-radius: 6px; background:#007bff; color:white; cursor:pointer; font-size:1rem; }
    .correct { background: #d4edda; }
    .wrong { background: #f8d7da; }
    .explanation { font-size:0.9rem; margin-top:5px; color:#333; }
    #result { text-align:center; margin-top:20px; font-size:1.2rem; }
    .badge { font-size: 1.5rem; margin-top: 10px; }
  </style>
</head>
<body>

  <header class="header">
    <div class="container nav">
      <div class="logo"><i class="fas fa-ribbon"></i> AarogyaLink</div>
      <div class="nav-controls">
        <a href="quiz.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
      </div>
    </div>
  </header>

  <div class="quiz-container">
    <div class="banner">
      <img src="pink-ribbon-logo-png-transparent-719x899.webp" alt="Breast Cancer Icon">
      <h2>🎗 Breast Cancer Awareness Quiz</h2>
    </div>

    <div class="progress-bar">
      <div id="progress" class="progress">0%</div>
    </div>

    <form id="quizForm"></form>
    <button class="btn-submit" onclick="submitQuiz(event)">Submit Quiz</button>
    <div id="result"></div>
  </div>

  <script>
    const quizData = [
      { question: "Q1. What is a common early sign of breast cancer?",
        options: ["Headache", "Lump in the breast", "Back pain", "Nausea"],
        correct: 1, explanation: "A lump in the breast is often the first noticeable symptom." },
      { question: "Q2. How often should women perform self-breast exams?",
        options: ["Every day", "Once a month", "Once a year", "Never"],
        correct: 1, explanation: "Monthly self-exams help in early detection." },
      { question: "Q3. Which age group is at higher risk for breast cancer?",
        options: ["20-30", "30-50", "50-70", "All ages"],
        correct: 2, explanation: "Risk increases with age, especially over 50." },
      { question: "Q4. What lifestyle factor can reduce risk?",
        options: ["Smoking", "Alcohol consumption", "Regular exercise", "High-fat diet"],
        correct: 2, explanation: "Regular exercise and healthy lifestyle can lower risk." },
      { question: "Q5. Mammograms are recommended to detect breast cancer in?",
        options: ["Children", "Young men", "Women above 40", "Everyone"],
        correct: 2, explanation: "Screening mammograms are recommended for women above 40." },
      { question: "Q6. Which of these is NOT a breast cancer treatment?",
        options: ["Chemotherapy", "Radiation therapy", "Herbal tea cure", "Surgery"],
        correct: 2, explanation: "Herbal remedies alone are not a medically proven treatment." },
      { question: "Q7. Breast cancer can affect?",
        options: ["Only women", "Only men", "Both men and women", "None"],
        correct: 2, explanation: "Though rare in men, it can affect both sexes." },
      { question: "Q8. Family history increases risk?",
        options: ["Yes", "No", "Depends on age", "Not sure"],
        correct: 0, explanation: "Family history is a known risk factor for breast cancer." },
      { question: "Q9. Pain is always an early symptom of breast cancer?",
        options: ["Yes", "No", "Sometimes", "Only after 50"],
        correct: 1, explanation: "Many early breast cancers are painless." },
      { question: "Q10. Early detection improves survival rates?",
        options: ["Yes", "No", "Depends on age", "Not proven"],
        correct: 0, explanation: "Early detection significantly improves treatment outcomes." }
    ];

    const quizForm = document.getElementById("quizForm");
    const progressBar = document.getElementById("progress");

    quizData.forEach((q, index) => {
      const questionBlock = document.createElement("div");
      questionBlock.classList.add("question");
      questionBlock.innerHTML = `
        <h4>${q.question}</h4>
        ${q.options.map((opt, i) => `
          <label class="option">
            <input type="radio" name="q${index}" value="${i}" onchange="updateProgress()"> ${opt}
          </label>
        `).join("")}
        <div id="exp${index}" class="explanation" style="display:none;"></div>
      `;
      quizForm.appendChild(questionBlock);
    });

    function updateProgress() {
      const answered = quizData.filter((_, i) => document.querySelector(`input[name="q${i}"]:checked`)).length;
      const total = quizData.length;
      const percent = Math.round((answered/total)*100);
      progressBar.style.width = percent + "%";
      progressBar.textContent = percent + "%";
    }

    function submitQuiz(e) {
      e.preventDefault();
      let score = 0;
      quizData.forEach((q, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const explanation = document.getElementById(`exp${i}`);
        if (selected) {
          if (parseInt(selected.value) === q.correct) {
            score++;
            selected.parentElement.classList.add("correct");
            explanation.innerHTML = "✅ Correct! " + q.explanation;
          } else {
            selected.parentElement.classList.add("wrong");
            explanation.innerHTML = "❌ Wrong! " + q.explanation;
          }
        } else {
          explanation.innerHTML = "⚠️ Not Attempted. " + q.explanation;
        }
        explanation.style.display = "block";
      });

      let badge = "";
      if(score >= 8) badge = "🥇 Gold Health Hero!";
      else if(score >= 5) badge = "🥈 Silver Health Learner!";
      else badge = "🥉 Bronze - Keep practicing!";

      document.getElementById("result").innerHTML = 
        `<strong>Your Score: ${score}/${quizData.length}</strong><br>
         <div class="badge">${badge}</div>`;
    }
  </script>

</body>
</html>
