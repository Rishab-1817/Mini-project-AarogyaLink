<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DoctorBot Embed (Ready-to-drop-in)</title>
  <link rel="stylesheet" href="../chatbot.css">
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; background:#f8fafc; margin:0; padding:20px }
    .note { max-width:760px; margin: 0 auto 20px; background:#fff; padding:14px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,0.06)}
  </style>
</head>
<body>
  <div class="note">
    <h3>DoctorBot Embed — Drop these files into your project</h3>
    <p>Copy `chatbot.css`, `chatbot.js` and this file into your project. Open this page via HTTP (not file://).</p>
  </div>

  <!-- Fallback Iframe (keeps UI if provider script fails) -->
  <div id="chatbot-container" role="dialog" aria-hidden="true">
    <iframe id="chatbot-iframe"
      src="https://readdy.ai/api/public/assistant/widget?projectId=fed07d8a-bd81-4046-8278-eced5eb7ed11"
      title="Chatbot" loading="lazy"
      allow="clipboard-read; clipboard-write; microphone; camera; autoplay"></iframe>
    <div id="chat-fallback">
      Chat failed to load — <a id="open-chat-newtab"
        href="https://readdy.ai/api/public/assistant/widget?projectId=fed07d8a-bd81-4046-8278-eced5eb7ed11"
        target="_blank" rel="noopener">open DoctorBot in a new tab</a>.
    </div>
  </div>

  <!-- Config (already filled with the values from your project) -->
  <script>
    window.DOCTOR_BOT_CONFIG = {
      assistantId: 'ae3149bf-85fd-4e58-898c-6ba1cd44241b',
      publicKey: '3f316145-e21e-4681-9bf0-7479538e1e33',
      projectId: 'fed07d8a-bd81-4046-8278-eced5eb7ed11',
      scriptUrl: 'https://static.readdy.ai/assistant/widget.umd.js',
      ctaTitle: '👨‍⚕️ DoctorBot',
      size: 'compact',
      mode: 'chat',
      voiceShowTranscript: true,
      title: 'DoctorBot - Your Healthcare Assistant',
      timeoutMs: 8000
    };
  </script>

  <script src="../chatbot.js" defer></script>
</body>
</html>
